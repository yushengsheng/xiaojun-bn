name: Release Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  XRAY_TAG: v26.3.27
  XRAY_ASSET: Xray-windows-64.zip
  SING_BOX_TAG: v1.13.5
  SING_BOX_ASSET: sing-box-1.13.5-windows-amd64.zip

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyinstaller-hooks-contrib requests PySocks eth-account eth-utils eth-abi eth-keyfile eth-keys eth-rlp eth-hash[pycryptodome] hexbytes rlp parsimonious cytoolz bitarray ckzg

      - name: Download proxy runtimes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $proxyRoot = Join-Path $PWD "build-proxy"
          $xrayDir = Join-Path $proxyRoot "xray"
          $singBoxDir = Join-Path $proxyRoot "sing-box"
          New-Item -ItemType Directory -Path $xrayDir -Force | Out-Null
          New-Item -ItemType Directory -Path $singBoxDir -Force | Out-Null

          $xrayTag = "${{ env.XRAY_TAG }}"
          $xrayAsset = "${{ env.XRAY_ASSET }}"
          Write-Host "Using pinned xray runtime: $xrayTag ($xrayAsset)"
          gh release download $xrayTag --repo XTLS/Xray-core --pattern $xrayAsset --dir $proxyRoot
          Expand-Archive -Path (Join-Path $proxyRoot $xrayAsset) -DestinationPath $xrayDir -Force
          Remove-Item (Join-Path $proxyRoot $xrayAsset) -Force

          $singBoxTag = "${{ env.SING_BOX_TAG }}"
          $singBoxAsset = "${{ env.SING_BOX_ASSET }}"
          Write-Host "Using pinned sing-box runtime: $singBoxTag ($singBoxAsset)"
          gh release download $singBoxTag --repo SagerNet/sing-box --pattern $singBoxAsset --dir $proxyRoot
          Expand-Archive -Path (Join-Path $proxyRoot $singBoxAsset) -DestinationPath $singBoxDir -Force
          Remove-Item (Join-Path $proxyRoot $singBoxAsset) -Force

          $xrayExe = Get-ChildItem $xrayDir -Filter "xray.exe" -File -Recurse | Select-Object -First 1
          if (-not $xrayExe) {
            throw "xray.exe was not found after extraction."
          }
          $singBoxExe = Get-ChildItem $singBoxDir -Filter "sing-box.exe" -File -Recurse | Select-Object -First 1
          if (-not $singBoxExe) {
            throw "sing-box.exe was not found after extraction."
          }

      - name: Prepare entry script
        shell: pwsh
        run: |
          Copy-Item "小军bn.py" "app_entry.py" -Force

      - name: Build Windows packages (onefile + portable onedir)
        shell: pwsh
        run: |
          $appName = "xiaojun-bn-${{ github.ref_name }}-windows-x64"
          $portableName = "xiaojun-bn-${{ github.ref_name }}-windows-x64-portable"

          $commonArgs = @(
            '--noconfirm',
            '--clean',
            '--windowed',
            '--noupx',
            '--hidden-import', 'page_onchain',
            '--hidden-import', 'api_clients',
            '--hidden-import', 'exchange_binance_client',
            '--hidden-import', 'app_paths',
            '--hidden-import', 'core_models',
            '--hidden-import', 'shared_utils',
            '--hidden-import', 'stores',
            '--hidden-import', 'secret_box',
            '--hidden-import', 'table_import_utils',
            '--hidden-import', 'task_progress',
            '--collect-all', 'requests',
            '--collect-all', 'urllib3',
            '--collect-all', 'certifi',
            '--collect-all', 'charset_normalizer',
            '--collect-all', 'idna',
            '--collect-all', 'socks',
            '--collect-all', 'cryptography',
            '--collect-all', 'cffi',
            '--collect-all', 'pycparser',
            '--collect-all', 'eth_account',
            '--collect-all', 'eth_utils',
            '--collect-all', 'eth_abi',
            '--collect-all', 'eth_keyfile',
            '--collect-all', 'eth_keys',
            '--collect-all', 'eth_rlp',
            '--collect-all', 'eth_hash',
            '--collect-all', 'hexbytes',
            '--collect-all', 'rlp',
            '--collect-all', 'parsimonious',
            '--collect-all', 'cytoolz',
            '--collect-all', 'bitarray',
            '--collect-all', 'ckzg'
          )

          Get-ChildItem "build-proxy/xray" -File -Recurse | ForEach-Object {
            $sourceDir = (Resolve-Path "build-proxy/xray").Path
            $relativeDir = Split-Path $_.FullName.Substring($sourceDir.Length).TrimStart('\') -Parent
            $dest = "bin/xray"
            if ($relativeDir) {
              $dest = "$dest/$($relativeDir -replace '\\', '/')"
            }
            $commonArgs += @('--add-binary', "$($_.FullName);$dest")
          }

          Get-ChildItem "build-proxy/sing-box" -File -Recurse | ForEach-Object {
            $sourceDir = (Resolve-Path "build-proxy/sing-box").Path
            $relativeDir = Split-Path $_.FullName.Substring($sourceDir.Length).TrimStart('\') -Parent
            $dest = "bin/sing-box"
            if ($relativeDir) {
              $dest = "$dest/$($relativeDir -replace '\\', '/')"
            }
            $commonArgs += @('--add-binary', "$($_.FullName);$dest")
          }

          pyinstaller --onefile --name $appName @commonArgs app_entry.py
          pyinstaller --onedir --name $portableName @commonArgs app_entry.py

      - name: Smoke test packaged apps
        shell: pwsh
        run: |
          $appName = "xiaojun-bn-${{ github.ref_name }}-windows-x64"
          $portableName = "xiaojun-bn-${{ github.ref_name }}-windows-x64-portable"
          function Invoke-Selftest($exePath, $workingDir, $label) {
            $logPath = Join-Path $workingDir "bot_log.txt"
            if (Test-Path $logPath) {
              Remove-Item $logPath -Force
            }

            $proc = Start-Process -FilePath $exePath -ArgumentList '--selftest' -WorkingDirectory $workingDir -PassThru -Wait
            if ($proc.ExitCode -ne 0) {
              if (Test-Path $logPath) {
                Write-Host "===== $label bot_log.txt ====="
                Get-Content $logPath
              }
              throw "$label selftest failed with exit code $($proc.ExitCode)"
            }
          }

          Invoke-Selftest (Resolve-Path "dist/$appName.exe") (Resolve-Path "dist") "Onefile"
          Invoke-Selftest (Resolve-Path "dist/$portableName/$portableName.exe") (Resolve-Path "dist/$portableName") "Portable"

      - name: Package release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          $exeName = "xiaojun-bn-${{ github.ref_name }}-windows-x64.exe"
          $exeZipName = "xiaojun-bn-${{ github.ref_name }}-windows-x64.zip"
          $portableName = "xiaojun-bn-${{ github.ref_name }}-windows-x64-portable"
          $portableZipName = "xiaojun-bn-${{ github.ref_name }}-windows-x64-portable.zip"

          Copy-Item "dist/$exeName" "release/$exeName"
          Compress-Archive -Path "release/$exeName" -DestinationPath "release/$exeZipName" -Force
          Compress-Archive -Path "dist/$portableName/*" -DestinationPath "release/$portableZipName" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: xiaojun-bn-windows
          path: release/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = Get-ChildItem "release/*" | ForEach-Object { $_.FullName }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          } else {
            gh release create $tag $assets --generate-notes
          }
